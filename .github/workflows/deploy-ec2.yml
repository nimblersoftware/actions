name: Publicação para EC2

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      docker_compose_file:
        required: true
        type: string

jobs:
  deploy:
    name: Publicação AWS EC2
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Configurando as credenciais na AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Enviando comando de deploy via SSM
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.AWS_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "aws ecr get-login-password --region ${{ vars.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ORGANIZATION }}",
              "cd ~ && git clone https://github.com/nimblersoftware/docker-compose.git || (cd ~/docker-compose && git pull)",
              "cd ~/docker-compose",
              "aws secretsmanager get-secret-value --region ${{ vars.AWS_REGION }} --secret-id nimbler-erp-api/${{ inputs.environment == 'production' && 'prod' || 'qas' }} --query SecretString --output text | python3 -c \"import sys,json; [print(f'{k}={v}') for k,v in json.load(sys.stdin).items()]\" > .env",
              "docker compose -f ${{ inputs.docker_compose_file }} pull",
              "docker compose -f ${{ inputs.docker_compose_file }} down",
              "docker compose -f ${{ inputs.docker_compose_file }} up -d",
              "docker image prune -f"
            ]' \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "SSM Command ID: $COMMAND_ID"

      - name: Aguardando conclusão do deploy
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ secrets.AWS_INSTANCE_ID }}"

      - name: Verificando resultado do deploy
        run: |
          STATUS=$(aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ secrets.AWS_INSTANCE_ID }}" \
            --query "StatusDetails" \
            --output text)
          echo "Status: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            aws ssm get-command-invocation \
              --command-id "${{ steps.ssm.outputs.command_id }}" \
              --instance-id "${{ secrets.AWS_INSTANCE_ID }}" \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
